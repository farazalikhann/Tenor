<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Tenor — Loan Calculator</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This 404 page redirects unmatched deep links back to index.html,
      // re-encoding the intended path in the query string so main.jsx can
      // restore it via history.replaceState once the app boots.
      var pathSegmentsToKeep = 1; // keep the "/Tenor" project-page segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
